lambda07/controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fd_controller:
      type: effort_controllers/JointGroupEffortController

    fd_ee_broadcaster:
      type: ee_pose_broadcaster/EePoseBroadcaster

    fd_inertia_broadcaster:
      type: fd_inertia_broadcaster/FdInertiaBroadcaster

    fd_clutch_broadcaster:
      type: fd_clutch_broadcaster/FdClutchBroadcaster

lambda07/fd_controller:
  ros__parameters:
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
      - effort
    joints:
      - lambda07_x
      - lambda07_y
      - lambda07_z
      - lambda07_roll
      - lambda07_pitch
      - lambda07_yaw
      - lambda07_clutch

lambda07/fd_ee_broadcaster:
  ros__parameters:
    transform_translation:
      - 0.0
      - 0.0
      - 0.0
    transform_rotation:
      - 0.0
      - 0.0
      - 0.0
    joints:
      - lambda07_x
      - lambda07_y
      - lambda07_z
      - lambda07_roll
      - lambda07_pitch
      - lambda07_yaw
    buttons: [button]

lambda07/fd_inertia_broadcaster:
  ros__parameters:
    transform_rotation:
      - 0.0
      - 0.0
      - 0.0
    inertia_interface_name: lambda07_inertia

lambda07/fd_clutch_broadcaster:
  ros__parameters:
    clutch_interface_name: "button/position"
    is_interface_a_button: true

